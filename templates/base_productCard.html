<div class="card" style="width: 18rem;">
  <img src="{{product.img_url}}" class="card-img-top" alt="{{product.title}}">
  <div class="card-body">
    <h3 class = "card-title">{{product.farm.farmname}}</h3>
    <p class="card-text">{{product.title}}</p>
    <label>Price:19.99GEL</label><a href="/order/{{product.id}}" class="btn btn-primary">Order</a>
  </div>
</div>
