{% extends 'base.html' %}
{% block content %}
<div class = "container d-flex align-items-center py-4 bg-body-tertiary justify-content-center">
    <main class="form-signin w-100 m-auto ">
        <form style = "max-width: 600px; margin:30px" method = "post">
            <img
                class="mb-4"
                src="https://img.pikbest.com/png-images/20241029/an-agriculture-logo-natural-farm-brand-icon_11024318.png!sw800"
                alt=""
                width="72"
                height="57"
            >
    
            <h1 class="h3 mb-3 fw-normal">Please sign in</h1>
    
            <div class="form-floating">
                <input
                    type="email"
                    class="form-control"
                    id="email"
                    name = "email"
                    placeholder="name@example.com"
                >
                <label for="email">Email address</label>
            </div>
    
            <div class="form-floating">
                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name= "password"
                    placeholder="Password"
                >
                <label for="password">Password</label>
            </div>
    
            <div class="form-check text-start my-3">
                <input
                    class="form-check-input"
                    type="checkbox"
                    value="remember-me"
                    id="checkDefault"
                >
                <label class="form-check-label" for="checkDefault">
                    Remember me
                </label>
            </div>
    
            <button class="btn btn-primary w-100 py-2" type="submit">
                Sign in
            </button>
    
        </form>
    </main>
</div>
{% endblock %}
